from env import StudentEnv
from models import Action

env = StudentEnv()
obs = env.reset()

print("[START]")

done = False
step_count = 0

actions = ["save", "invest_low", "invest_high", "spend", "learn"]

while not done and step_count < 20:

    action_name = actions[step_count % len(actions)]

    obs, reward, done, _ = env.step(Action(action=action_name))

    print(f"[STEP] action={action_name} reward={reward.value} money={obs.money}")

    step_count += 1

print("[END]")